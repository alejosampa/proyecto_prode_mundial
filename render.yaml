services:
  - type: web
    name: prode-mundial-2026
    env: node
    plan: free
    rootDir: prode-mundial-2026
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: MATCH_LIMIT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
